<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Tech AI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0e1118;
            color: #e3e6ed;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Barra superiore */
        header {
            background-color: #161b26;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #242c3d;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 1.2rem;
            color: #4f46e5;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        header p {
            font-size: 0.8rem;
            color: #8fa0dd;
        }

        /* Contenitore Messaggi */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-message {
            background-color: #4f46e5;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            background-color: #1c2333;
            color: #e3e6ed;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #2d374d;
        }

        /* Barra di Input in basso */
        #input-container {
            background-color: #161b26;
            padding: 12px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #242c3d;
            align-items: center;
        }

        #message-input {
            flex: 1;
            background-color: #0e1118;
            border: 1px solid #2d374d;
            color: #e3e6ed;
            padding: 12px 16px;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
        }

        #message-input:focus {
            border-color: #4f46e5;
        }

        #send-btn {
            background-color: #4f46e5;
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        #send-btn:active {
            background-color: #3b31c8;
        }
    </style>
</head>
<body>

    <header>
        <h1>Gemini Tech</h1>
        <p>L'IA sempre attiva per il modding e la tecnologia</p>
    </header>

    <div id="chat-container">
        <div class="message ai-message">
            Ehi! Sono la tua IA dedicata. Pronto a configurare qualche server, smanettare con Linux o fare modding estremo? Chiedimi qualsiasi cosa! 🛠️
        </div>
    </div>

    <div id="input-container">
        <input type="text" id="message-input" placeholder="Scrivi un messaggio..." autocomplete="off">
        <button id="send-btn">Invia</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender === 'user' ? 'user-message' : 'ai-message');
            msgDiv.textContent = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            messageInput.value = '';

            // Piccolo indicatore di caricamento
            const tempMsg = document.createElement('div');
            tempMsg.classList.add('message', 'ai-message');
            tempMsg.textContent = 'Sta scrivendo...';
            chatContainer.appendChild(tempMsg);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                chatContainer.removeChild(tempMsg);
                appendMessage(data.reply, 'ai');
            } catch (error) {
                chatContainer.removeChild(tempMsg);
                appendMessage("Errore di connessione. Controlla il server!", 'ai');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
