<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Tech AI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: #1e293b;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #334155;
            color: #38bdf8;
        }

        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-message {
            background-color: #38bdf8;
            color: #0f172a;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            background-color: #1e293b;
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #334155;
        }

        #input-container {
            background-color: #1e293b;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #334155;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: #38bdf8;
        }

        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <header>🤖 Gemini Tech Bot</header>

    <div id="chat-container">
        <div class="message bot-message">Ciao! Sono la tua IA personale. Chiedimi pure qualsiasi cosa su Linux, programmazione, emulatori o tecnologia! 🚀</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Scrivi un messaggio..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Invia</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        function appendMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.classList.add(isUser ? 'user-message' : 'bot-message');
            messageDiv.textContent = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, true);
            userInput.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                if (data.reply) {
                    appendMessage(data.reply, false);
                } else {
                    appendMessage("Errore: Risposta non ricevuta dal server.", false);
                }
            } catch (error) {
                appendMessage("Errore di connessione al server.", false);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
